name: Build WhatsApp Apps

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-mac-apps:
    runs-on: macos-latest
    strategy:
      matrix:
        app: [nc-business, nc-photo-reports, personal]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build ${{ matrix.app }} for macOS (x64 + ARM64)
      shell: bash
      run: |
        echo "🍎 Building ${{ matrix.app }}..."
        
        cp package.json temp.package.json.backup 2>/dev/null || true
        cp .env temp.env.backup 2>/dev/null || true
        
        cp "configs/${{ matrix.app }}.package.json" package.json
        cp "configs/${{ matrix.app }}.env" .env
        
        # Build universal binary (x64 + arm64) without publishing
        npx electron-builder --mac --x64 --publish=never
        npx electron-builder --mac --arm64 --publish=never
        
        mv temp.package.json.backup package.json 2>/dev/null || rm -f package.json
        mv temp.env.backup .env 2>/dev/null || rm -f .env
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
        SKIP_CODE_SIGNING: true
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare DMG files
      shell: bash
      run: |
        mkdir -p archives
        
        APP_NAME=$(grep "APP_NAME=" "configs/${{ matrix.app }}.env" | cut -d'=' -f2 | tr -d '"')
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
        
        echo "📦 Preparing $APP_NAME..."
        cd "dist/${{ matrix.app }}"
        ls -la
        
        if ls *.dmg 1> /dev/null 2>&1; then
          cp *.dmg "../../archives/"
        fi
        
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}
        path: archives/*.dmg
        retention-days: 90
        
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac-apps]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.dmg
        name: WhatsApp Apps ${{ github.ref_name }}
        body: |
          # WhatsApp Desktop Apps for macOS
          
          Three separate WhatsApp apps, each with its own isolated session.
          
          ## Downloads
          
          - **NC Business** - WhatsApp for business communications
          - **NC Photo Reports** - WhatsApp for photo reports
          - **Personal** - Personal WhatsApp
          
          ## Installation
          
          1. Download the .dmg file for each app you want
          2. Double-click to mount
          3. Drag to Applications folder
          4. Open and scan QR code to login
          
          Each app maintains its own separate login session.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
